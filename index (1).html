<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selsey — Generator Etykiet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f4f4f2;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .app { width: 100%; max-width: 560px; }
    .logo-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
    .logo-box {
      background: #111; color: white;
      padding: 6px 14px; border-radius: 6px;
      font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
    }
    .logo-box span { font-weight: 400; }
    .logo-bar h1 { font-size: 16px; font-weight: 500; color: #555; }
    .card {
      background: white; border-radius: 14px;
      border: 1px solid #e5e4df; padding: 1.5rem; margin-bottom: 1rem;
    }
    .card-title {
      font-size: 13px; font-weight: 600; color: #aaa;
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 1rem;
    }
    .field { margin-bottom: 1.2rem; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; font-weight: 500; }
    input[type="text"], select, input[type="number"] {
      width: 100%; padding: 10px 14px; font-size: 15px;
      border: 1px solid #ddd; border-radius: 8px; outline: none;
      background: #fafafa; color: #111;
      transition: border-color 0.15s; font-family: inherit;
    }
    input[type="text"]:focus, select:focus, input[type="number"]:focus {
      border-color: #111; background: white;
    }
    input[type="number"] { width: 80px; }
    .copies-row { display: flex; align-items: center; gap: 12px; }
    .copies-row label { margin: 0; white-space: nowrap; }
    .btn-row { display: flex; gap: 10px; margin-bottom: 1.5rem; }
    .btn-primary {
      flex: 1; padding: 12px; font-size: 14px; font-weight: 600;
      background: #111; color: white; border: none; border-radius: 10px;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.8; }
    .btn-print {
      flex: 1; padding: 12px; font-size: 14px; font-weight: 500;
      background: white; color: #111; border: 1px solid #ccc;
      border-radius: 10px; cursor: pointer; transition: background 0.15s;
    }
    .btn-print:hover { background: #f0f0ee; }

    /* manage toggle */
    .manage-toggle {
      width: 100%; padding: 10px; font-size: 13px; font-weight: 500;
      background: transparent; color: #888; border: 1px dashed #ccc;
      border-radius: 10px; cursor: pointer; margin-bottom: 1rem;
      transition: all 0.15s;
    }
    .manage-toggle:hover { background: #f0f0ee; color: #111; border-color: #aaa; }

    /* courier management panel */
    .manage-panel { display: none; }
    .manage-panel.open { display: block; }
    .add-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .add-row input { flex: 1; margin: 0; }
    .btn-add {
      padding: 10px 16px; font-size: 14px; font-weight: 600;
      background: #111; color: white; border: none; border-radius: 8px;
      cursor: pointer; white-space: nowrap;
    }
    .btn-add:hover { opacity: 0.8; }
    .courier-list { display: flex; flex-direction: column; gap: 6px; }
    .courier-item {
      display: flex; align-items: center; justify-content: space-between;
      background: #fafafa; border: 1px solid #eee; border-radius: 8px;
      padding: 8px 12px; font-size: 14px; font-weight: 500; color: #111;
    }
    .courier-item.default-item { color: #999; }
    .btn-del {
      background: none; border: none; cursor: pointer;
      color: #ccc; font-size: 18px; line-height: 1; padding: 0 2px;
      transition: color 0.15s;
    }
    .btn-del:hover { color: #e53e3e; }
    .reset-link {
      display: block; text-align: center; margin-top: 10px;
      font-size: 12px; color: #aaa; cursor: pointer; text-decoration: underline;
    }
    .reset-link:hover { color: #e53e3e; }

    /* preview */
    .preview-label {
      font-size: 11px; color: #aaa; text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 8px;
    }
    .label-preview {
      background: #2e2e2e; border-radius: 12px;
      aspect-ratio: 1.414; display: flex; flex-direction: column;
      justify-content: space-between; padding: 1.8rem;
    }
    .label-logo-wrap {
      background: white; display: inline-flex; align-items: center;
      padding: 5px 12px; border-radius: 4px; align-self: flex-start;
    }
    .label-logo-wrap span {
      font-family: Arial, sans-serif; font-size: 17px; font-weight: 700;
      color: #111; letter-spacing: -0.5px;
    }
    .label-logo-wrap span.plus { font-weight: 400; }
    .label-content {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center; gap: 1rem;
    }
    .label-order {
      font-family: Arial, sans-serif;
      font-size: clamp(22px, 5.5vw, 50px);
      font-weight: 700; color: white; line-height: 1.2; letter-spacing: -0.5px;
    }
    .label-courier {
      font-family: Arial, sans-serif;
      font-size: clamp(18px, 4.5vw, 40px);
      font-weight: 700; color: white; letter-spacing: 1px;
    }
    .placeholder-text { color: #666; font-size: 15px; }
    @media (max-width: 480px) { body { padding: 1rem 0.75rem; } }
    @media print {
      body { background: none; padding: 0; }
      @page { size: A4; margin: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="logo-bar">
      <div class="logo-box"><span class="plus">+</span>Selsey</div>
      <h1>Generator etykiet</h1>
    </div>

    <div class="card">
      <div class="field">
        <label for="order-input">Numer zamówienia (pełny)</label>
        <input type="text" id="order-input" placeholder="np. PICK/08044/26/05/CL1" autocomplete="off" />
      </div>
      <div class="field">
        <label for="courier-select">Kurier / sposób dostawy</label>
        <select id="courier-select"></select>
      </div>
      <div class="field">
        <div class="copies-row">
          <label for="copies-input">Liczba kopii:</label>
          <input type="number" id="copies-input" value="1" min="1" max="20" />
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="updatePreview()">Podgląd</button>
      <button class="btn-print" onclick="printLabel()">🖨 Drukuj / PDF</button>
    </div>

    <!-- Manage couriers -->
    <button class="manage-toggle" onclick="toggleManage()">⚙️ Zarządzaj kurierami</button>

    <div class="card manage-panel" id="manage-panel">
      <div class="card-title">Dodaj / usuń kuriera</div>
      <div class="add-row">
        <input type="text" id="new-courier" placeholder="Nazwa nowego kuriera..." />
        <button class="btn-add" onclick="addCourier()">Dodaj</button>
      </div>
      <div class="courier-list" id="courier-list"></div>
      <span class="reset-link" onclick="resetCouriers()">Przywróć domyślną listę</span>
    </div>

    <p class="preview-label" style="margin-top:1rem;">Podgląd etykiety</p>
    <div class="label-preview" id="label-preview">
      <div class="label-logo-wrap"><span><span class="plus">+</span>Selsey</span></div>
      <div class="label-content">
        <div class="placeholder-text">wprowadź numer zamówienia</div>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_COURIERS = [
      'ZADBANO','KUEHNE NAGEL','BEJOT','SCHENKER','SPT',
      'SUUS','AMBRO','BEJOT WF','ODBIÓR WŁASNY B2B','NOVYNABYTOK','TRANSPORT DEDYKOWANY'
    ];
    const STORAGE_KEY = 'selsey_couriers';

    function getCouriers() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : [...DEFAULT_COURIERS];
      } catch(e) { return [...DEFAULT_COURIERS]; }
    }

    function saveCouriers(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    function renderSelect() {
      const sel = document.getElementById('courier-select');
      const current = sel.value;
      const couriers = getCouriers();
      sel.innerHTML = '<option value="">— wybierz kuriera —</option>';
      couriers.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        if (c === current) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function renderList() {
      const list = document.getElementById('courier-list');
      const couriers = getCouriers();
      list.innerHTML = '';
      couriers.forEach((c, i) => {
        const item = document.createElement('div');
        item.className = 'courier-item';
        item.innerHTML = `<span>${c}</span><button class="btn-del" title="Usuń" onclick="removeCourier(${i})">×</button>`;
        list.appendChild(item);
      });
    }

    function addCourier() {
      const input = document.getElementById('new-courier');
      const val = input.value.trim().toUpperCase();
      if (!val) return;
      const couriers = getCouriers();
      if (couriers.includes(val)) { alert('Ten kurier już jest na liście.'); return; }
      couriers.push(val);
      saveCouriers(couriers);
      input.value = '';
      renderSelect();
      renderList();
    }

    function removeCourier(index) {
      const couriers = getCouriers();
      if (!confirm(`Usunąć kuriera "${couriers[index]}"?`)) return;
      couriers.splice(index, 1);
      saveCouriers(couriers);
      renderSelect();
      renderList();
    }

    function resetCouriers() {
      if (!confirm('Przywrócić domyślną listę kurierów? Twoje zmiany zostaną utracone.')) return;
      localStorage.removeItem(STORAGE_KEY);
      renderSelect();
      renderList();
    }

    function toggleManage() {
      const panel = document.getElementById('manage-panel');
      panel.classList.toggle('open');
    }

    document.getElementById('new-courier').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addCourier();
    });

    // label logic
    const orderInput = document.getElementById('order-input');
    const courierSelect = document.getElementById('courier-select');
    orderInput.addEventListener('input', updatePreview);
    courierSelect.addEventListener('change', updatePreview);

    function splitOrder(str) {
      const parts = str.split('/');
      if (parts.length >= 5) return [parts[0]+'/'+parts[1], '/'+parts[2]+'/'+parts[3]+'/'+parts[4]];
      if (parts.length === 4) return [parts[0]+'/'+parts[1], '/'+parts[2]+'/'+parts[3]];
      return [str, null];
    }

    function updatePreview() {
      const num = orderInput.value.trim();
      const courier = courierSelect.value;
      const preview = document.getElementById('label-preview');
      let content = '';
      if (num) {
        const [l1, l2] = splitOrder(num);
        content = '<div class="label-order">'+l1+(l2?'<br>'+l2:'')+'</div>';
        if (courier) content += '<div class="label-courier">'+courier+'</div>';
      } else {
        content = '<div class="placeholder-text">wprowadź numer zamówienia</div>';
      }
      preview.innerHTML = `
        <div class="label-logo-wrap"><span><span class="plus">+</span>Selsey</span></div>
        <div class="label-content">${content}</div>
      `;
    }

    function printLabel() {
      const num = orderInput.value.trim();
      const courier = courierSelect.value;
      const copies = parseInt(document.getElementById('copies-input').value) || 1;
      if (!num) { alert('Wprowadź numer zamówienia.'); return; }
      if (!courier) { alert('Wybierz kuriera.'); return; }
      const [l1, l2] = splitOrder(num);
      const orderHtml = l1+(l2?'<br>'+l2:'');
      let labels = '';
      for (let i = 0; i < copies; i++) {
        const pb = i < copies-1 ? 'page-break-after:always;' : '';
        labels += `
          <div style="width:210mm;height:297mm;background:#2e2e2e;display:flex;flex-direction:column;justify-content:space-between;padding:28mm 18mm;${pb}box-sizing:border-box;">
            <div style="background:white;display:inline-flex;align-items:center;padding:8px 16px;border-radius:4px;align-self:flex-start;">
              <span style="font-family:Arial,sans-serif;font-size:30px;font-weight:700;color:#111;letter-spacing:-1px;"><span style="font-weight:400">+</span>Selsey</span>
            </div>
            <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:28px;">
              <div style="font-family:Arial,sans-serif;font-size:78px;font-weight:700;color:white;line-height:1.2;letter-spacing:-1px;">${orderHtml}</div>
              <div style="font-family:Arial,sans-serif;font-size:60px;font-weight:700;color:white;letter-spacing:2px;">${courier}</div>
            </div>
          </div>`;
      }
      const win = window.open('', '_blank');
      win.document.write(`<!DOCTYPE html><html><head><title>Etykieta ${num}</title>
        <style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#555;}@media print{body{background:none;}@page{size:A4;margin:0;}}</style>
      </head><body>${labels}</body></html>`);
      win.document.close();
      win.focus();
      setTimeout(() => win.print(), 500);
    }

    // init
    renderSelect();
    renderList();
    updatePreview();
  </script>
</body>
</html>
